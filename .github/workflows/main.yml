name: Production Deployment

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Locate Project and Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Searching for the project directory on the server..."

            # Find the directory containing our deploy.sh script (skipping common system dirs to be fast)
            TARGET_DIR=$(find /home /var/www -name "deploy.sh" -not -path "*/node_modules/*" -not -path "*/vendor/*" -print -quit | xargs dirname)

            if [ -z "$TARGET_DIR" ]; then
              echo "Error: Could not locate a directory containing 'deploy.sh' on the server."
              echo "Please ensure the project is cloned somewhere under /home or /var/www first."
              exit 1
            fi

            echo "Found project directory at: $TARGET_DIR"
            cd "$TARGET_DIR"

            # Make sure it's executable and run it
            chmod +x deploy.sh
            ./deploy.sh
